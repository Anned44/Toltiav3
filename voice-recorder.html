<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Grabar Voz">
    <meta name="theme-color" content="#0f172a">
    <title>Grabar Voz • Offline</title>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Grabar%20Voz%22,%22short_name%22:%22Voz%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22%230f172a%22,%22theme_color%22:%22%230f172a%22,%22icons%22:[]}">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        :root {
            /* Colores vibrantes para categorías */
            --color-compose: #ff6b6b;     /* Rojo coral */
            --color-idea: #4ecdc4;         /* Turquesa */
            --color-demo: #ffd93d;         /* Amarillo cálido */
            --color-practice: #a8e6cf;     /* Verde menta */
            --color-other: #c7b3ff;        /* Lavanda */
            
            /* Base */
            --bg-dark: #0f172a;
            --bg-card: #1a2a4a;
            --text-primary: #f0f4f8;
            --text-secondary: #a0aec0;
            --border-color: #2d3e5f;
            
            /* Spacing */
            --radius: 16px;
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a2a4a 100%);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0 auto;
            background: var(--bg-dark);
            position: relative;
        }

        /* HEADER */
        header {
            padding: max(var(--spacing-md), env(safe-area-inset-top)) var(--spacing-lg);
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(26, 42, 74, 0.95));
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: var(--spacing-xs);
        }

        /* RECORDING SECTION */
        .recorder-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl) var(--spacing-lg);
            gap: var(--spacing-lg);
            position: relative;
            z-index: 1;
        }

        .recorder-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 40px rgba(255, 107, 107, 0.3);
            position: relative;
            overflow: hidden;
        }

        .recorder-circle::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            animation: pulse-ring 1.5s ease-out infinite;
        }

        .recorder-circle:active {
            transform: scale(0.95);
        }

        .recorder-circle.recording {
            animation: recording-pulse 1s ease-in-out infinite;
        }

        @keyframes recording-pulse {
            0%, 100% { box-shadow: 0 10px 40px rgba(255, 107, 107, 0.3); }
            50% { box-shadow: 0 10px 60px rgba(255, 107, 107, 0.5); }
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        .recorder-icon {
            font-size: 48px;
            position: relative;
            z-index: 2;
        }

        .recorder-text {
            font-size: 14px;
            font-weight: 600;
            color: white;
            text-align: center;
            margin-top: var(--spacing-md);
        }

        .time-display {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 32px;
            font-weight: 300;
            color: #ff6b6b;
            letter-spacing: 2px;
            min-height: 40px;
            text-align: center;
        }

        /* CATEGORIES */
        .categories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-sm);
            margin-top: var(--spacing-md);
        }

        .category-btn {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid transparent;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.6;
        }

        .category-btn.compose {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border-color: #ff6b6b;
        }

        .category-btn.idea {
            background: rgba(78, 205, 196, 0.15);
            color: #4ecdc4;
            border-color: #4ecdc4;
        }

        .category-btn.demo {
            background: rgba(255, 217, 61, 0.15);
            color: #ffd93d;
            border-color: #ffd93d;
        }

        .category-btn.practice {
            background: rgba(168, 230, 207, 0.15);
            color: #a8e6cf;
            border-color: #a8e6cf;
        }

        .category-btn.other {
            background: rgba(199, 179, 255, 0.15);
            color: #c7b3ff;
            border-color: #c7b3ff;
        }

        .category-btn.active {
            opacity: 1;
            box-shadow: 0 0 20px currentColor;
        }

        /* RECORDINGS LIST */
        .recordings-container {
            flex: 1;
            overflow-y: auto;
            padding: var(--spacing-lg);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
            scroll-behavior: smooth;
        }

        .recordings-container::-webkit-scrollbar {
            width: 6px;
        }

        .recordings-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .recordings-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .recordings-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 var(--spacing-sm);
        }

        .recording-item {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: var(--spacing-md);
            border-left: 4px solid;
            display: flex;
            gap: var(--spacing-md);
            align-items: center;
            animation: slideIn 0.3s ease;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border-color);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .recording-item:active {
            transform: scale(0.98);
            background: rgba(26, 42, 74, 0.8);
        }

        .recording-item.compose { border-left-color: #ff6b6b; }
        .recording-item.idea { border-left-color: #4ecdc4; }
        .recording-item.demo { border-left-color: #ffd93d; }
        .recording-item.practice { border-left-color: #a8e6cf; }
        .recording-item.other { border-left-color: #c7b3ff; }

        .recording-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .recording-info {
            flex: 1;
            min-width: 0;
        }

        .recording-time {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .recording-duration {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .recording-actions {
            display: flex;
            gap: var(--spacing-xs);
            flex-shrink: 0;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-icon:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.9);
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: var(--spacing-xl);
            font-size: 14px;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
            opacity: 0.5;
        }

        /* MODAL */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: flex-end;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: var(--radius) var(--radius) 0 0;
            padding: var(--spacing-lg);
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            padding-bottom: calc(var(--spacing-lg) + env(safe-area-inset-bottom));
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
        }

        .player-controls {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            align-items: center;
        }

        .btn-play {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn-play:active {
            transform: scale(0.9);
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: #ff6b6b;
            border-radius: 2px;
            width: 0%;
        }

        .time-info {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 40px;
            text-align: right;
            font-family: monospace;
        }

        .btn-delete {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-delete:active {
            background: rgba(255, 107, 107, 0.4);
            transform: scale(0.9);
        }

        .recording-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: var(--spacing-sm);
            padding-top: var(--spacing-sm);
            border-top: 1px solid var(--border-color);
        }

        .btn-download {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            border: none;
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-download:active {
            background: rgba(78, 205, 196, 0.4);
            transform: scale(0.9);
        }

        .mic-permission {
            padding: var(--spacing-lg);
            text-align: center;
        }

        .btn-primary {
            width: 100%;
            padding: var(--spacing-md);
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: var(--spacing-md);
            transition: all 0.2s ease;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎙️ Grabar</h1>
            <p class="subtitle">Almacenamiento offline • Sin conexión necesaria</p>
        </header>

        <div class="recorder-section">
            <div id="micPermissionPrompt" class="mic-permission" style="display: none;">
                <p style="margin-bottom: var(--spacing-md); color: var(--text-secondary);">
                    Necesitamos acceso al micrófono para grabar audio
                </p>
                <button class="btn-primary" id="requestMicBtn">Permitir Micrófono</button>
            </div>

            <div id="recordingUI" style="display: none; width: 100%; text-align: center;">
                <div class="time-display" id="timeDisplay">00:00</div>
                <div class="recorder-circle recording" id="recButton">
                    <span class="recorder-icon">⏺️</span>
                </div>
                <p class="recorder-text">
                    <span id="recordStatus">Grabando...</span>
                </p>

                <div class="categories">
                    <button class="category-btn compose active" data-category="compose">🎼 Composición</button>
                    <button class="category-btn idea" data-category="idea">💡 Idea</button>
                    <button class="category-btn demo" data-category="demo">📱 Demo</button>
                    <button class="category-btn practice" data-category="practice">🎹 Práctica</button>
                </div>
            </div>
        </div>

        <div class="recordings-container" id="recordingsList">
            <div class="empty-state">
                <div class="empty-icon">🎵</div>
                <p>Sin grabaciones aún</p>
                <p style="font-size: 12px; margin-top: 8px;">Toca el círculo para comenzar a grabar</p>
            </div>
        </div>

        <div class="modal" id="playerModal">
            <div class="modal-content">
                <div class="modal-header">
                    <span id="modalTitle">Reproducir</span>
                    <button class="modal-close" id="closeModal">✕</button>
                </div>

                <div class="player-controls">
                    <button class="btn-play" id="playBtn">▶️</button>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                    <div class="time-info" id="timeInfo">0:00</div>
                </div>

                <audio id="audioPlayer" style="width: 100%; margin-bottom: var(--spacing-lg);"></audio>

                <div class="recording-meta" id="recordingMeta"></div>

                <div style="display: flex; gap: var(--spacing-sm); margin-top: var(--spacing-lg);">
                    <button class="btn-download" id="downloadBtn" title="Descargar">⬇️</button>
                    <button class="btn-delete" id="deleteBtn" title="Eliminar">🗑️</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ INDEXEDDB SETUP ============
        let db;
        const dbName = 'VoiceRecorderDB';
        const storeName = 'recordings';

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (e) => {
                    const objStore = e.target.result.createObjectStore(storeName, { keyPath: 'id', autoIncrement: true });
                    objStore.createIndex('timestamp', 'timestamp', { unique: false });
                };
            });
        };

        // ============ RECORDING LOGIC ============
        let mediaRecorder;
        let audioChunks = [];
        let recordingStartTime;
        let timerInterval;
        let currentCategory = 'compose';
        let allRecordings = [];

        const recButton = document.getElementById('recButton');
        const timeDisplay = document.getElementById('timeDisplay');
        const recordStatus = document.getElementById('recordStatus');
        const recordingUI = document.getElementById('recordingUI');
        const micPrompt = document.getElementById('micPermissionPrompt');

        const requestMic = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupRecorder(stream);
                micPrompt.style.display = 'none';
                recordingUI.style.display = 'block';
            } catch (err) {
                alert('Permiso de micrófono denegado');
            }
        };

        const setupRecorder = (stream) => {
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
            mediaRecorder.onstop = saveRecording;
        };

        const startRecording = () => {
            if (!mediaRecorder) {
                micPrompt.style.display = 'block';
                recordingUI.style.display = 'none';
                return;
            }

            audioChunks = [];
            recordingStartTime = Date.now();
            mediaRecorder.start();
            recButton.classList.add('recording');
            recordStatus.textContent = 'Grabando...';

            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                timeDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 100);
        };

        const stopRecording = () => {
            mediaRecorder.stop();
            clearInterval(timerInterval);
            recButton.classList.remove('recording');
            recordStatus.textContent = 'Parada';
        };

        const saveRecording = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const duration = Math.floor((Date.now() - recordingStartTime) / 1000);

            const recording = {
                timestamp: new Date().toLocaleString('es-MX'),
                duration,
                category: currentCategory,
                blob: audioBlob,
            };

            const transaction = db.transaction([storeName], 'readwrite');
            const store = transaction.objectStore(storeName);
            const addRequest = store.add(recording);

            addRequest.onsuccess = () => {
                recording.id = addRequest.result;
                allRecordings.unshift(recording);
                renderRecordings();
                timeDisplay.textContent = '00:00';
                recordStatus.textContent = 'Parada';
            };
        };

        const deleteRecording = async (id) => {
            return new Promise((resolve) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const deleteRequest = store.delete(id);
                deleteRequest.onsuccess = () => {
                    allRecordings = allRecordings.filter(r => r.id !== id);
                    renderRecordings();
                    document.getElementById('playerModal').classList.remove('active');
                    resolve();
                };
            });
        };

        // ============ RENDERING ============
        const formatDuration = (seconds) => {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        };

        const getCategoryEmoji = (cat) => {
            const emojis = {
                compose: '🎼',
                idea: '💡',
                demo: '📱',
                practice: '🎹',
            };
            return emojis[cat] || '📝';
        };

        const renderRecordings = () => {
            const container = document.getElementById('recordingsList');

            if (allRecordings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎵</div>
                        <p>Sin grabaciones aún</p>
                        <p style="font-size: 12px; margin-top: 8px;">Toca el círculo para comenzar a grabar</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '<div class="recordings-header">Grabaciones</div>';

            allRecordings.forEach((rec) => {
                const item = document.createElement('div');
                item.className = `recording-item ${rec.category}`;
                item.innerHTML = `
                    <span class="recording-icon">${getCategoryEmoji(rec.category)}</span>
                    <div class="recording-info">
                        <div class="recording-time">${rec.timestamp}</div>
                        <div class="recording-duration">${formatDuration(rec.duration)}</div>
                    </div>
                    <div class="recording-actions">
                        <button class="btn-icon" data-action="play" data-id="${rec.id}">▶️</button>
                    </div>
                `;

                item.querySelector('[data-action="play"]').addEventListener('click', (e) => {
                    e.stopPropagation();
                    openPlayer(rec);
                });

                container.appendChild(item);
            });
        };

        // ============ PLAYER MODAL ============
        const modal = document.getElementById('playerModal');
        const closeModal = document.getElementById('closeModal');
        const audioPlayer = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeInfo = document.getElementById('timeInfo');
        const deleteBtn = document.getElementById('deleteBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        let currentPlayingId = null;

        const openPlayer = (recording) => {
            currentPlayingId = recording.id;
            const url = URL.createObjectURL(recording.blob);
            audioPlayer.src = url;

            document.getElementById('modalTitle').textContent = `${getCategoryEmoji(recording.category)} ${recording.timestamp}`;
            document.getElementById('recordingMeta').innerHTML = `
                <strong>Duración:</strong> ${formatDuration(recording.duration)}<br>
                <strong>Categoría:</strong> ${recording.category.charAt(0).toUpperCase() + recording.category.slice(1)}<br>
                <strong>Grabado:</strong> ${recording.timestamp}
            `;

            deleteBtn.onclick = () => {
                if (confirm('¿Eliminar esta grabación?')) {
                    deleteRecording(recording.id);
                }
            };

            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.href = url;
                link.download = `grabacion-${recording.timestamp.replace(/[\/: ]/g, '-')}.webm`;
                link.click();
            };

            modal.classList.add('active');
        };

        closeModal.addEventListener('click', () => {
            modal.classList.remove('active');
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            playBtn.textContent = '▶️';
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal.click();
            }
        });

        playBtn.addEventListener('click', () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                playBtn.textContent = '⏸️';
            } else {
                audioPlayer.pause();
                playBtn.textContent = '▶️';
            }
        });

        audioPlayer.addEventListener('timeupdate', () => {
            const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = percent + '%';
            timeInfo.textContent = formatDuration(Math.floor(audioPlayer.currentTime));
        });

        audioPlayer.addEventListener('ended', () => {
            playBtn.textContent = '▶️';
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        });

        // ============ CATEGORY SELECTION ============
        document.querySelectorAll('.category-btn').forEach((btn) => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
            });
        });

        // ============ RECORDING TOGGLE ============
        let isRecording = false;
        recButton.addEventListener('click', () => {
            isRecording ? stopRecording() : startRecording();
            isRecording = !isRecording;
        });

        // ============ MIC PERMISSION ============
        document.getElementById('requestMicBtn').addEventListener('click', requestMic);

        // ============ LOAD RECORDINGS ============
        const loadRecordings = async () => {
            return new Promise((resolve) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const getAllRequest = store.getAll();

                getAllRequest.onsuccess = () => {
                    allRecordings = getAllRequest.result.reverse();
                    renderRecordings();
                    resolve();
                };
            });
        };

        // ============ INIT ============
        (async () => {
            await initDB();
            await loadRecordings();

            // Check for initial mic permission
            try {
                const permission = await navigator.permissions.query({ name: 'microphone' });
                if (permission.state === 'granted') {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    setupRecorder(stream);
                    micPrompt.style.display = 'none';
                    recordingUI.style.display = 'block';
                }
            } catch (err) {
                // Silently continue
            }
        })();
    </script>
</body>
</html>
